<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#103a5a"></stop>
      <stop offset="48%" stop-color="#061b33"></stop>
      <stop offset="100%" stop-color="#020713"></stop>
    </radialGradient>

    <radialGradient id="drop" cx="36%" cy="28%" r="66%">
      <stop offset="0%" stop-color="#ffffff"></stop>
      <stop offset="18%" stop-color="#9cfaff"></stop>
      <stop offset="58%" stop-color="#4dfcff"></stop>
      <stop offset="100%" stop-color="#1ca8ff"></stop>
    </radialGradient>

    <linearGradient id="ring" x1="8" y1="12" x2="56" y2="52">
      <stop offset="0%" stop-color="#4dfcff"></stop>
      <stop offset="55%" stop-color="#1ca8ff"></stop>
      <stop offset="100%" stop-color="#b26cff"></stop>
    </linearGradient>

    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.4" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"></rect>

  <circle cx="32" cy="34" r="22" fill="none" stroke="url(#ring)" stroke-width="2.2" opacity="0.9" filter="url(#glow)"></circle>

  <ellipse cx="32" cy="35" rx="22" ry="8" fill="none" stroke="#4dfcff" stroke-width="1.4" opacity="0.58" filter="url(#softGlow)"></ellipse>

  <ellipse cx="32" cy="35" rx="12" ry="21" fill="none" stroke="#9cfaff" stroke-width="1.1" opacity="0.42"></ellipse>

  <path d="M32 10
       C25 20 20 27 20 36
       C20 45 25.8 52 32 52
       C38.2 52 44 45 44 36
       C44 27 39 20 32 10Z" fill="url(#drop)" opacity="0.92" filter="url(#glow)"></path>

  <path d="M28 24
       C30 20 31 18 32 16
       C33 19 36 24 38 29" fill="none" stroke="#ffffff" stroke-width="1.3" stroke-linecap="round" opacity="0.72"></path>

  <circle cx="25" cy="28" r="2.2" fill="#ffffff" opacity="0.9"></circle>
  <circle cx="45" cy="19" r="1.5" fill="#b26cff" opacity="0.85" filter="url(#softGlow)"></circle>
  <circle cx="50" cy="43" r="1.3" fill="#4dfcff" opacity="0.9" filter="url(#softGlow)"></circle>
</svg>